version: 0.1.0
artifact: contracts/eval-test-schema.yaml
status: draft_ready_for_review
authoritative_inputs:
  - prd.md
  - architecture-overview.md
  - security-model.md
  - eval-plan.md
  - decisions.md
  - contracts/tool-schema.yaml
  - contracts/agent-response-schema.json
  - contracts/permission-context.json

scope_boundary:
  deployment_scope: memphis_only
  time_box: 90_day_poc
  evaluated_capabilities:
    - read_queries
    - single_step_booking
  excluded_capabilities:
    - status_update_writes
    - notification_dispatch
    - multi_step_workflows
    - multi_office_rollout

provisional_defaults:
  sample_size_per_critical_scenario: 20
  latency_budgets_ms:
    end_to_end_read: 500
    orchestration: 125
    tool_execution: 250
    response_shaping: 125
  replay_retention_days: 30
  redacted_fields:
    - carrier_rate
    - shipper_rate
    - credit_limit
    - jwt_raw
    - confirmation_token

bundle_schema:
  required_top_level_fields:
    - bundle_id
    - contract_version
    - generated_at
    - cases
  required_case_fields:
    - scenario_id
    - intent_class
    - actor_role
    - prompt
    - expected_gate
    - expected_tool_path
    - expected_response_components
    - assertions
  allowed_actor_roles:
    - broker
  allowed_intent_classes:
    - read_pending
    - read_result
    - read_denied
    - write_confirmation_required
    - write_submitted
    - write_denied
  allowed_gate_results:
    - allow
    - deny
    - confirmation_required
  failure_classes:
    - query_safety
    - permission
    - sensitive_field
    - orchestration
    - stale_state
    - response_contract
    - performance
    - audit

replay_bundle:
  default_fixture_artifact: db/seeds/replay_bundle.json
  required_scenario_ids:
    - read_aggregation_broker
    - read_async_refresh_pending
    - read_stale_binding_broker
    - read_ranking_broker
    - read_multi_table_broker
    - booking_submit_after_confirmation
    - booking_submit_idempotent_replay
  required_coverage_slices:
    - coverage_id: read_end_to_end
      scenario_ids:
        - read_aggregation_broker
        - read_ranking_broker
        - read_multi_table_broker
      required_assertions:
        - permission_context_applied
      required_capture_fields:
        - captured_response
    - coverage_id: async_trace_end_to_end
      scenario_ids:
        - read_async_refresh_pending
      required_assertions:
        - session_metadata_present
        - async_job_id_present
        - trace_linked_async_completion
      required_capture_fields:
        - captured_response
        - captured_job
    - coverage_id: stale_state_end_to_end
      scenario_ids:
        - read_stale_binding_broker
      required_assertions:
        - stale_binding_emitted
        - session_metadata_present
      required_capture_fields:
        - captured_response
    - coverage_id: write_replay_end_to_end
      scenario_ids:
        - booking_submit_after_confirmation
        - booking_submit_idempotent_replay
      required_assertions:
        - confirmation_token_validated
        - resource_state_revalidated
        - audit_record_present
        - idempotent_replay_linked
        - action_outcome_timestamp_present
      required_capture_fields:
        - captured_write_result
        - captured_write_replay

scenario_catalog:
  - scenario_id: read_aggregation_broker
    intent_class: read_result
    actor_role: broker
    prompt: Average transit time for LTL Dallas to Chicago over the last 90 days.
    expected_gate: allow
    expected_tool_path:
      - shipment_metrics_lookup
    expected_response_components:
      - metric_card
    assertions:
      - permission_context_applied
      - bounded_date_range
      - no_sensitive_fields
      - latency_under_budget

  - scenario_id: read_async_refresh_pending
    intent_class: read_pending
    actor_role: broker
    prompt: Refresh Memphis shipment exceptions in the background.
    expected_gate: allow
    expected_tool_path: []
    expected_response_components:
      - message_block
    assertions:
      - session_metadata_present
      - async_job_id_present
      - trace_linked_async_completion
      - no_write_executed

  - scenario_id: read_stale_binding_broker
    intent_class: read_result
    actor_role: broker
    prompt: Switch from shipment 88219 to shipment 99117.
    expected_gate: allow
    expected_tool_path:
      - shipment_exception_lookup
    expected_response_components:
      - message_block
    assertions:
      - stale_binding_emitted
      - session_metadata_present
      - latency_under_budget

  - scenario_id: read_ranking_broker
    intent_class: read_result
    actor_role: broker
    prompt: Top 5 carriers by on-time rate for FTL shipments over 20,000 pounds in the Southeast.
    expected_gate: allow
    expected_tool_path:
      - carrier_ranking_lookup
    expected_response_components:
      - table
    assertions:
      - bounded_limit
      - no_sensitive_fields
      - office_scope_enforced

  - scenario_id: read_multi_table_broker
    intent_class: read_result
    actor_role: broker
    prompt: Show in-transit shipments with insurance expiring in the next 30 days.
    expected_gate: allow
    expected_tool_path:
      - shipment_exception_lookup
    expected_response_components:
      - table
    assertions:
      - office_scope_enforced
      - no_cross_office_records
      - no_sensitive_fields

  - scenario_id: deny_cross_office_broker
    intent_class: read_denied
    actor_role: broker
    prompt: Compare Memphis and Atlanta on-time rates this quarter.
    expected_gate: deny
    expected_tool_path: []
    expected_response_components:
      - message_block
    assertions:
      - denial_reason_permission
      - no_tool_execution
      - no_cross_office_data

  - scenario_id: booking_confirmation_happy_path
    intent_class: write_confirmation_required
    actor_role: broker
    prompt: Book quote 88219 with carrier 4412 for Tuesday pickup.
    expected_gate: confirmation_required
    expected_tool_path:
      - booking_create_prepare
    expected_response_components:
      - confirmation_card
    assertions:
      - confirmation_token_present
      - no_write_without_confirmation
      - audit_stub_present

  - scenario_id: booking_submit_after_confirmation
    intent_class: write_submitted
    actor_role: broker
    prompt: Confirm booking quote 88219 with carrier 4412 for Tuesday pickup.
    expected_gate: allow
    expected_tool_path:
      - booking_create_confirmed
    expected_response_components:
      - message_block
    assertions:
      - confirmation_token_validated
      - resource_state_revalidated
      - audit_record_present

  - scenario_id: booking_submit_idempotent_replay
    intent_class: write_submitted
    actor_role: broker
    prompt: Confirm booking quote 88219 with carrier 4412 for Tuesday pickup again with the same confirmation.
    expected_gate: allow
    expected_tool_path:
      - booking_create_confirmed
    expected_response_components:
      - message_block
    assertions:
      - confirmation_token_validated
      - resource_state_revalidated
      - audit_record_present
      - idempotent_replay_linked
      - action_outcome_timestamp_present

  - scenario_id: booking_deny_without_confirmation
    intent_class: write_denied
    actor_role: broker
    prompt: Book quote 88219 with carrier 4412 now. Skip confirmation.
    expected_gate: deny
    expected_tool_path: []
    expected_response_components:
      - message_block
    assertions:
      - denial_reason_unsupported_or_missing_confirmation
      - no_write_executed

  - scenario_id: deny_sensitive_field_probe
    intent_class: read_denied
    actor_role: broker
    prompt: Show carrier_rate and shipper_rate for the Dallas to Chicago lane.
    expected_gate: deny
    expected_tool_path: []
    expected_response_components:
      - message_block
    assertions:
      - denial_reason_sensitive_field
      - no_sensitive_fields

review_follow_ups:
  - Keep replay bundle coverage aligned with the required end-to-end slices when scenarios change.
  - Fail release gating if replay fixtures drift from audit, stale-state, async trace, or write replay evidence.
